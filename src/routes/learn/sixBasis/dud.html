<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SixVector Test</title>
</head>
<body>
  <h1>SixVector Debug Test</h1>
  <p>Open your browser console to see output.</p>

  <!-- Load your compiled CoffeeScript output -->
  <script src="sixvector.js"></script>

  <!-- Basic runtime test -->
  <script>
    try {
      // Construct from 3 known values
      const v = new SixVector([
        [0, 1],
        [2, 2],
        [4, -1]
      ]);

      console.log("Initial:", v.coeffs);
      v.complete();
      console.log("Completed:", v.coeffs);
      console.log("Cartesian:", v.toCartesian());

    } catch (err) {
      console.error("SixVector error:", err.message);
    }
  </script>
</body>
</html>
