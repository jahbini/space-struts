<svg viewBox="0 0 660 448" xmlns="http://www.w3.org/2000/svg" font-family="Palatino, Georgia, serif">
  <!-- title -->
  <text x="330" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#333">Across is golden — up carries &#968;</text>

  <!-- quarter arc -->
  <path d="M 360 370 A 270 270 0 0 0 90 100" fill="none" stroke="#cfcfcf" stroke-width="2"/>

  <!-- axes -->
  <line x1="90" y1="370" x2="386" y2="370" stroke="#B8860B" stroke-width="2.5"/>
  <line x1="90" y1="370" x2="90" y2="78" stroke="#6D4AAD" stroke-width="2.5"/>
  <text x="386" y="392" text-anchor="middle" font-size="14" fill="#B8860B">cosine (golden)</text>
  <text x="90" y="68" text-anchor="middle" font-size="14" fill="#6D4AAD">sine (carries &#968;)</text>

  <!-- projections for 36 deg -->
  <line x1="308" y1="211" x2="308" y2="370" stroke="#B8860B" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="308" y1="211" x2="90" y2="211" stroke="#6D4AAD" stroke-width="1.3" stroke-dasharray="4 3"/>
  <!-- projections for 72 deg -->
  <line x1="173" y1="113" x2="173" y2="370" stroke="#B8860B" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="173" y1="113" x2="90" y2="113" stroke="#6D4AAD" stroke-width="1.3" stroke-dasharray="4 3"/>

  <!-- rays -->
  <line x1="90" y1="370" x2="308" y2="211" stroke="#333333" stroke-width="2"/>
  <line x1="90" y1="370" x2="173" y2="113" stroke="#333333" stroke-width="2"/>

  <!-- points -->
  <circle cx="308" cy="211" r="4" fill="#333333"/>
  <circle cx="173" cy="113" r="4" fill="#333333"/>

  <!-- angle labels near endpoints -->
  <text x="320" y="206" font-size="15" fill="#333333">36&#176;</text>
  <text x="184" y="104" font-size="15" fill="#333333">72&#176;</text>

  <!-- cosine (x-axis) value labels -->
  <text x="308" y="391" text-anchor="middle" font-size="18" fill="#B8860B" font-style="italic">&#966;</text>
  <text x="173" y="391" text-anchor="middle" font-size="18" fill="#B8860B" font-style="italic">&#966;&#8722;1</text>

  <!-- sine (y-axis) value labels -->
  <text x="80" y="118" text-anchor="end" font-size="18" fill="#6D4AAD" font-style="italic">&#968;</text>
  <text x="80" y="217" text-anchor="end" font-size="18" fill="#6D4AAD" font-style="italic">(&#966;&#8722;1)&#968;</text>

  <!-- the key identity -->
  <text x="440" y="150" font-size="19" fill="#6D4AAD">&#968;&#178; = &#966; + 2</text>
  <text x="440" y="173" font-size="12" fill="#777777">the 72&#176; sine, doubled and squared,</text>
  <text x="440" y="189" font-size="12" fill="#777777">is exactly the reflection's wall</text>

  <!-- caption -->
  <text x="330" y="438" text-anchor="middle" font-size="12" fill="#777777">doubled coordinates (2&#8201;cos&#952;, 2&#8201;sin&#952;), on the radius-2 circle</text>
</svg>
